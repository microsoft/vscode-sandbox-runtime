trigger:
  branches:
    include:
    - main
  tags:
    include:
    - v*

pr:
  branches:
    include:
    - '*'

variables:
  NODE_VERSION: '18.x'
  BUN_VERSION: '1.3.1'

jobs:
- job: Linux_x64
  displayName: Build seccomp (x64)
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    NPM_ARCH: 'x64'
  steps:
  - template: build.yml

- job: Linux_arm64
  displayName: Build seccomp (arm64)
  pool:
    vmImage: 'ubuntu-24.04-arm'
  variables:
    NPM_ARCH: 'arm64'
  steps:
  - template: build.yml

- job: ValidatePackage
  displayName: Validate package build
  dependsOn:
  - Linux_x64
  - Linux_arm64
  condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/v')))
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    RUN_RELEASE_CHECKS: 'false'
    PUBLISH_TO_NPM: 'false'
  steps:
  - template: publish.yml

- job: Publish
  displayName: Publish to npm
  dependsOn:
  - Linux_x64
  - Linux_arm64
  condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    RUN_RELEASE_CHECKS: 'true'
    PUBLISH_TO_NPM: 'true'
  steps:
  - template: publish.yml
